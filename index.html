      function randomNormal(mean = 0, stdDev = 1) {
        const u1 = Math.random();
        const u2 = Math.random();
        const z0 =
          Math.sqrt(-2.0 * Math.log(u1)) * Math.cos(2.0 * Math.PI * u2);
        return z0 * stdDev + mean;
      }

      function longestRun(arr) {
        if (arr.length === 0) return 0;

        return arr.reduce(
          (acc, curr, i) => {
            if (i === 0) return acc;

            if (curr === arr[i - 1]) {
              acc.current++;
              acc.max = Math.max(acc.max, acc.current);
            } else {
              acc.current = 1;
            }
            return acc;
          },
          { max: 1, current: 1 },
        ).max;
      }

      function toUpperCase(str) {
        return String(str).replace(/ř/g, "Ř").toUpperCase();
      }

      function toLowerCase(str) {
        return String(str).replace(/Ř/g, "ř").toLowerCase();
      }

      function capitalize(str) {
        const s = String(str);
        return toUpperCase(s[0]) + s.slice(1);
      }

      function toTitleCase(str) {
        return toLowerCase(str).split(/\s/).map(capitalize).join(" ");
      }

      function randomWord(letters) {
        let result = [];
        let letterTypeHistory = [];

        // generate word from letters
        for (let i = 0; i < letters; i++) {
          const last = result[result.length - 1];
          const lastType = letterTypeHistory[letterTypeHistory.length - 1];

          let consWeight = 0.5;
          if (lastType === "consonant") {
            consWeight = 0.25;
          } else if (lastType === "vowel") {
            consWeight = 1;
          }

          const nextType = Math.random() < consWeight ? "consonant" : "vowel";
          const nextPool = [
            ...(nextType === "consonant" ? CONSONANTS : VOWELS),
          ];

          const dupIndex = nextPool.indexOf(last);
          if (dupIndex !== -1) {
            nextPool.splice(dupIndex, 1);
          }

          const next = nextPool[Math.floor(Math.random() * nextPool.length)];
          result.push(next);
          letterTypeHistory.push(nextType);
        }

        // reject bad words
        if (letters >= 2) {
          if (letterTypeHistory.every((t) => t === "consonant")) {
            // word is all consonants
            return randomWord(letters);
          }
        }

        if (letters >= 3) {
          if (longestRun(letterTypeHistory) >= 3) {
            // word has a run of too many consonants
            return randomWord(letters);
          }

          if (
            letterTypeHistory[0] === "consonant" &&
            letterTypeHistory[1] === "consonant"
          ) {
            const first = result[0];
            const second = result[1];
            const digraphLookupBegin = ALLOWED_BEGIN_DIPGRAPHS[first];
            if (!digraphLookupBegin.has(second)) {
              // word begins in unpronouncable consonant pile
              return randomWord(letters);
            }
          }

          if (
            letterTypeHistory[result.length - 2] === "consonant" &&
            letterTypeHistory[result.length - 1] === "consonant"
          ) {
            const secondLast = result[result.length - 2];
            const last = result[result.length - 1];
            const digraphLookupEnd = ALLOWED_END_DIPGRAPHS[secondLast];
            if (!digraphLookupEnd.has(last)) {
              // word ends in unpronouncable consonant pile
              return randomWord(letters);
            }
          }
        }

        // return result
        return result.join("");
      }

      function randomBroodName() {

      function pick(arr) {

      function plural(x, n) {

      function pickWeighted(arr, fn = (x) => x.weight) {
        if (!arr) return undefined;
        const weights = arr.map(fn);
        const totalWeight = weights.reduce((acc, val) => acc + val, 0);
        const value = Math.random() * totalWeight;
        let currentWeight = 0;
        let index = 0;
        while (
          index < arr.length - 1 &&
          currentWeight + weights[index] < value
        ) {
          currentWeight += weights[index];
          index++;
        }
        return arr[index];
      }

            this.age + 200 + Math.abs(Math.floor(randomNormal(200, 50)));
        }

        getApprenticeAge() {
          return 16 + Math.abs(Math.floor(randomNormal(4, 6)));
        }

        gainApprentice() {
          if (!this.apprentices) {
            this.apprentices = [];
          }
          const apprentice = new Dragon().generateBasicDetails();
          apprentice.age = apprentice.getApprenticeAge();
          apprentice.setJourneymanAge();
          this.apprentices.push(apprentice);
          return apprentice;
        }

        compatibleWith(other) {
          switch (this.sexuality) {
            case "homo":
              return (
                other.canBearEggs === this.canBearEggs ||
                other.canSireEggs === this.canSireEggs
              );
            case "hetero":
              return (
                other.canBearEggs !== this.canBearEggs ||
                other.canSireEggs !== this.canSireEggs
              );
            case "pan":
              return true;
            case "ace":
              return false;
          }
        }

        generatePronouns() {
          this.pronouns = pickWeighted(PRONOUNS);
          this.canBearEggs = Math.random() < this.pronouns.canBearEggsChance;
          this.canSireEggs = Math.random() < this.pronouns.canSireEggsChance;
        }

        setNextEggAge() {
          this.nextEggAge =
            this.age + Math.abs(Math.floor(randomNormal(60, 5)));
        }

        becomeHermit() {
          this.lair = undefined;
          this.job = "hermit";
          this.jobRank = "self-employed";
          this.apprentices = [];
          this.mentor = undefined;
          this.journeymanAge = undefined;
          this.masterAge = undefined;
          this.grandmasterAge = undefined;
          this.addLifeEntry(
            `${this.pronouns.they} ${this.pronouns.makePlural("decide")} to become a hermit, settling in the wilds of ${this.location} and living a humble life of hunting and merriment.`,
          );
        }

        generateLife() {
          while (true) {
            // add birth message
            if (this.age === 0) {
              this.generatePronouns();

              const nParents = Math.abs(Math.floor(randomNormal(2.5, 0.25)));
              for (let i = 0; i < nParents; i++) {
                this.parents.push(new Dragon().generateBasicDetails());
              }

              this.lairborn = Math.random() < 0.7;
              this.location = pick(LOCATIONS);
              if (this.lairborn) {
                this.lair = randomLair();
              }
              let place;
              if (nParents === 0) {
                if (this.lairborn) {
                  place = `a forgotten corner of ${this.lair}`;
                } else {
                  place = `a lonely cave in ${this.location}`;
                }
              } else {
                if (this.lairborn) {
                  place = `the lair ${this.lair}`;
                } else {
                  place = `the wilds of ${this.location}`;
                }
              }

              let parentMessage;
              if (nParents === 0) {
                parentMessage = `Nobody is around to witness ${this.pronouns.their} hatching in ${place}... And nobody comes for ${this.pronouns.them}.`;
              } else {
                parentMessage = `${capitalize(this.pronouns.their)} hatching in ${place} is witnessed by ${this.pronouns.their} ${plural("broodparent", nParents)} ${listify(this.parents.map((p) => p.displayName()))}.`;
              }

              const colorMods = [];
              const nColorMods = Math.floor(Math.abs(randomNormal(0, 1.5)));

              for (let i = 0; i < nColorMods; i++) {
                colorMods.push(pickWeighted(COLOR_MODS).name());
              }

              const mutations = [];
              const nMutations = Math.floor(Math.abs(randomNormal(0, 1.5)));

              for (let i = 0; i < nMutations; i++) {
                mutations.push(pickWeighted(MUTATIONS).name());
              }

              const eyeless = mutations.find((e) => e === "no eyes");
              let features = `${pickWeighted(COLORS).name} ${pickWeighted(HIDE_TYPES).name}`;
              if (nColorMods > 0) {
                features += `, with ${listify(colorMods)}`;
              }
              if (!eyeless) {
                features += `, and ${pickWeighted(COLORS).name} eyes`;
              }

              this.addLifeEntry(
                `a brave new soul breaks free from ${this.pronouns.their} egg to witness Lucania!`,
                `${capitalize(this.pronouns.they)} ${this.pronouns.makePlural("peek")} from ${this.pronouns.their} eggshell to display ${features}.`,
                ...(nMutations === 0
                  ? []
                  : [
                      `The gods have blessed ${this.pronouns.them}! ${capitalize(this.pronouns.they)} ${this.pronouns.are()} hatched with ${listify(mutations)}.`,
                    ]),
                parentMessage,
              );
            }

            // add naming
            if (!this.namingAge) {
              this.namingAge = Math.abs(
                Math.floor(
                  this.parents.length === 0
                    ? randomNormal(4, 1)
                    : randomNormal(0, 0.5),
                ),
              );
            }

            if (!this.name && this.age === this.namingAge) {
              this.name = randomGivenName();

              if (this.parents.length > 0) {
                this.addLifeEntry(
                  `${pick(this.parents).displayName()} decides on naming ${this.pronouns.them} ${this.displayName()}.`,
                );
              } else {
                this.addLifeEntry(
                  `${this.pronouns.they} ${this.pronouns.makePlural("decide")} on naming ${this.pronouns.them}self ${this.displayName()}.`,
                );
              }
            }

            // add natural death
            if (!this.lifespan) {
              this.lifespan = Math.abs(
                Math.floor(randomNormal(144 * 4, 144 * 0.5)),
              );
            }

            if (this.lifespan <= this.age) {
              this.addLifeEntry(
                `${this.displayName()} dies peacefully of advanced age.`,
                `Live on, and know that ${this.displayName()} once flew.`,
              );
              return this;
            }

            // add sudden death
            let deathRate = 0.001;
            if (this.lifespan === Infinity) {
              deathRate /= 10;
            }
            if (Math.random() < deathRate) {
              this.addLifeEntry(
                `${this.displayName()} ${pickWeighted(CAUSES_OF_DEATH).name()}.`,
                `Live on, and know that ${this.displayName()} once flew.`,
              );
              return this;
            }

            // add aspect discovery
            if (!this.aspectAge) {
              this.aspectAge = Math.abs(Math.floor(4 + randomNormal(3, 3)));
            }

            if (!this.aspect && this.age === this.aspectAge) {
              this.aspect = pick(ASPECTS);
              this.addLifeEntry(
                `${this.pronouns.they} ${this.pronouns.makePlural("discover")} that ${this.pronouns.they} ${this.pronouns.are()} of the ${this.displayAspect()}-Aspect.`,
                `The god of ${this.displayAspect()} smiles upon you and your breath, ${this.displayName()}!`,
              );
            }

            // add flying
            if (!this.flyingAge) {
              this.flyingAge = Math.abs(Math.floor(randomNormal(10, 1)));
            }

            if (this.age === this.flyingAge) {
              this.addLifeEntry(
                `${this.pronouns.they} ${this.pronouns.makePlural("begin")} learning how to fly, officially crowning ${this.pronouns.them} as fledgling.`,
              );
            }

            // add naming ceremony
            if (!this.adultAge) {
              this.adultAge = Math.abs(Math.floor(randomNormal(24, 2)));
            }

            if (this.name && this.age === this.adultAge) {
              const broodnameFromParents =
                this.parents.length === 0 ? false : Math.random() < 0.95;
              const parent = pick(this.parents);
              const broodname = broodnameFromParents
                ? parent.broodName()
                : randomBroodName();

              let parentMessage;
              if (this.parents.length === 0) {
                parentMessage = `It came from the heart, with nobody else to take from...`;
              } else if (broodnameFromParents) {
                parentMessage = `${parent.displayName()} is so very proud to be chosen to carry on the ${broodname} brood.`;
              } else {
                parentMessage = `It comes as a shock to ${this.pronouns.their} ${plural("broodparent", this.parents.length)}.`;
              }

              this.name = `${broodname} ${this.name}`;
              this.addLifeEntry(
                `${this.pronouns.they} ${this.pronouns.are()} now a fine young ${this.pronouns.dragon} in the world's eyes!`,
                `In a solemn ceremony, ${this.pronouns.they} ${this.pronouns.makePlural("choose")} the broodname of ${broodname}.`,
                parentMessage,
                `Long fly ${this.displayName()}!`,
              );
            }

            // add apprenticship
            if (!this.jobAge) {
              this.jobAge = this.getApprenticeAge();
            }

            if (!this.job && this.age > this.adultAge && Math.random() < 0.05) {
              this.job = "goodwill";
              this.jobRank = "self-employed";
              this.goodwill = pick([
                "socialites",
                "prostitutes",
                "counselors",
                "dreamers",
              ]);
              if (!this.lair) {
                this.lair = randomLair();
              }

              this.addLifeEntry(
                `with no productive ambitions, ${this.pronouns.they} ${this.pronouns.makePlural("become")} a goodwill, living in ${this.lair} among the lair's ${this.goodwill}.`,
              );
            }

            if (!this.job && this.age === this.jobAge) {
              if (Math.random() < 0.1) {
                // hermit
                this.becomeHermit();
              } else if (Math.random() < 0.2) {
                // self employed
                this.job = pickWeighted(JOBS).name;
                this.jobRank = "self-employed";
                this.masterAge =
                  this.age + Math.abs(Math.floor(randomNormal(100, 25)));

                this.addLifeEntry(
                  `${this.pronouns.they} ${this.pronouns.makePlural("take")} it upon ${this.pronouns.them}self to become a ${this.job}.`,
                );
              } else {
                // apprenticed
                this.mentor = new Dragon().generateBasicDetails();
                this.mentor.jobRank = "master";
                this.mentor.job = this.job = pickWeighted(JOBS).name;
                this.jobRank = "apprentice";
                this.setJourneymanAge();

                const hadToMove = this.lair === undefined;
                if (hadToMove) {
                  this.lair = randomLair();
                }

                this.addLifeEntry(
                  `${this.pronouns.they} ${this.pronouns.makePlural("take")} interest in the ${this.job} ${this.mentor.displayName()}'s work, and becomes ${this.mentor.pronouns.their} apprentice.`,
                  ...(hadToMove
                    ? [
                        `${capitalize(this.pronouns.they)} ${this.pronouns.makePlural("move")} in with ${this.pronouns.their} mentor in the nearby lair of ${this.lair} to further learn.`,
                      ]
                    : []),
                );
              }
            }

            // add job progression
            if (this.age === this.journeymanAge) {
              const mentor = this.mentor;
              if (mentor) {
                this.jobRank = `journey${this.pronouns.dragon}`;
                this.setMasterAge();

                if (Math.random() < 0.5) {
                  this.mentor = undefined;
                }

                this.addLifeEntry(
                  `${this.pronouns.they} ${this.pronouns.have()} been dedicated in honing the art of the ${this.job}!`,
                  `${mentor.displayName()} has deemed ${this.pronouns.them} a ${this.jobRank}, ${this.mentor ? "and they continue to work together" : "and they go their separate ways"}.`,
                );
              }
            }

            if (this.age === this.masterAge) {
              this.jobRank = "master";
              this.setGrandmasterAge();
              this.mentor = undefined;
              const apprentice = this.gainApprentice();

              this.addLifeEntry(
                `${this.pronouns.they} ${this.pronouns.have()} been dedicated in honing the art of the ${this.job}!`,
                `${capitalize(this.pronouns.they)} ${this.pronouns.makePlural("take")} on ${this.pronouns.their} first apprentice, ${apprentice.displayName()}, officially becoming a ${this.jobRank}.`,
              );
            }

            if (this.age === this.grandmasterAge) {
              this.jobRank = "grandmaster";
              this.addLifeEntry(
                `${this.pronouns.they} ${this.pronouns.have()} been dedicated in honing the art of the ${this.job}!`,
                `${capitalize(this.pronouns.they)} ${this.pronouns.are()} deemed peerless in the ${this.pronouns.their} craft by a titler, earning the title of ${this.jobRank}.`,
              );
            }

            // add job changes
            if (this.age > this.jobAge) {
              let jobChangeChance = 0.001;
              if (this.job === "hermit" || this.job === "goodwill") {
                jobChangeChance /= 2;
              }
              if (this.lifespan === Infinity) {
                jobChangeChance /= 10;
              }

              let becomeHermitChance = 0.0005;
              if (this.job === "goodwill") {
                becomeHermitChance /= 2;
              }
              if (this.lifespan === Infinity) {
                becomeHermitChance /= 10;
              }

              if (Math.random() < jobChangeChance) {
                const oldJobs = Object.keys(this.highestRankInJobs);
                const missesOldJob = oldJobs.length > 0 && Math.random() < 0.7;
                const newJob = missesOldJob
                  ? pick(oldJobs)
                  : pickWeighted(JOBS).name;
                const newJobRank = this.highestRankInJobs[newJob];
                if (newJob !== this.job) {
                  if (this.job) {
                    this.highestRankInJobs[this.job] = this.jobRank;
                  }

                  this.job = newJob;
                  this.apprentices = [];
                  this.mentor = undefined;

                  if (newJobRank) {
                    this.jobRank = newJobRank;
                    switch (this.jobRank) {
                      case "apprentice":
                        this.mentor = new Dragon().generateBasicDetails();
                        this.setJourneymanAge();
                        break;
                      case "journeydrake":
                      case "journeyhen":
                      case "journeydragon":
                      case "self-employed":
                        this.setMasterAge();
                        break;
                      case "master":
                        this.setGrandmasterAge();
                        break;
                    }
                    this.addLifeEntry(
                      `${this.pronouns.they} ${this.pronouns.makePlural("decide")} to settle back into ${this.pronouns.their} life of being a ${this.job}.`,
                    );
                  } else {
                    this.jobRank = "apprentice";
                    this.mentor = new Dragon().generateBasicDetails();
                    this.setJourneymanAge();
                    this.addLifeEntry(
                      `${this.pronouns.they} ${this.pronouns.makePlural("decide")} to try ${this.pronouns.their} claw at being a ${this.job} instead.`,
                      `${capitalize(this.pronouns.they)} swiftly ${this.pronouns.makePlural("find")} a new mentor, ${this.mentor.displayName()}, willing to take ${this.pronouns.them} on.`,
                    );
                  }
                }
              } else if (
                this.job != "hermit" &&
                Math.random() < becomeHermitChance
              ) {
                if (this.job) {
                  this.highestRankInJobs[this.job] = this.jobRank;
                }
                this.apprentices = [];
                this.mentor = undefined;

                this.becomeHermit();
              }
            }

            // check apprentices
            if (this.age > this.masterAge) {
              if (Math.random() < 0.005) {
                const apprentice = this.gainApprentice();
                this.addLifeEntry(
                  `${this.pronouns.they} ${this.pronouns.makePlural("take")} on a new apprentice, ${apprentice.displayName()}.`,
                );
              }

              const apprenticesNotGraduated = [];
              for (const apprentice of this.apprentices) {
                if (apprentice.age === apprentice.journeymanAge) {
                  this.lifetimeDragonsApprenticed++;
                  const worksTogether = Math.random() < 0.5;
                  this.addLifeEntry(
                    `${this.pronouns.they} ${this.pronouns.makePlural("deem")} ${apprentice.displayName()} as a capable ${this.job}, and sends ${apprentice.pronouns.them} on ${apprentice.pronouns.their} way as a new journey${apprentice.pronouns.dragon}.`,
                  );
                } else {
                  apprenticesNotGraduated.push(apprentice);
                }
              }
              this.apprentices = apprenticesNotGraduated;
            }

            // check love
            if (!this.mates) this.mates = [];
            if (!this.sexuality) {
              this.sexuality = pickWeighted(SEXUALITIES).name;
              this.poly = Math.random() < 0.1;
            }

            if (
              this.sexuality !== "ace" &&
              this.age > this.adultAge &&
              Math.random() < 0.005 &&
              (this.poly || this.mates.length < 2)
            ) {
              const mate = new Dragon().generateBasicDetails();
              mate.age = Math.abs(Math.floor(randomNormal(this.age, 10)));
              do {
                mate.generatePronouns();
              } while (!this.compatibleWith(mate));
              this.mates.push(mate);
              mate.mateStatus = "courting";

              this.addLifeEntry(
                `${this.pronouns.they} began to court the ${mate.pronouns.dragon} ${mate.displayName()}.`,
              );
            }

            for (const mate of this.mates) {
              if (mate.mateStatus === "courting") {
                if (Math.random() < 0.1) {
                  mate.mateStatus = "mated";
                  this.addLifeEntry(
                    `${this.displayName()} and ${mate.displayName()} are joined together in mateship, in a humble yet beautiful ceremony.`,
                    `May they fly entwined for all time!`,
                  );
                } else if (Math.random() < 0.05) {
                  mate.mateStatus = undefined;
                  this.addLifeEntry(
                    `${this.displayName()} and ${mate.displayName()} decide not to move forward with their mateship.`,
                  );
                }
              }
            }
            this.mates = this.mates.filter((m) => m.mateStatus);

            // check eggs
            if (!this.eggAge) {
              this.eggAge = Math.abs(Math.floor(randomNormal(30, 4)));
              this.menopauseAge = Math.abs(Math.floor(randomNormal(400, 50)));
              this.setNextEggAge();
              this.eggs = [];
              this.children = [];
            }

            if (this.age > this.eggAge && this.age < this.menopauseAge) {
              const validDragonsToBearEggs = [this, ...this.mates].filter(
                (d) => d.canBearEggs,
              );
              const validDragonsToSireEggs = [this, ...this.mates].filter(
                (d) => d.canSireEggs,
              );

              for (const dragon of validDragonsToBearEggs) {
                if (!dragon.nextEggAge) dragon.setNextEggAge();
                if (dragon.nextEggAge === this.age) {
                  let fertilizedChance = 0.8;
                  const sire =
                    Math.random() < 0.05
                      ? undefined
                      : pick(validDragonsToSireEggs);
                  if (!sire) {
                    fertilizedChance = 0.2;
                  }
                  const fertilized = Math.random() < fertilizedChance;
                  const clutchSize =
                    1 + Math.abs(Math.floor(randomNormal(2.5, 1)));
                  const family = [this, ...this.mates].map((d) =>
                    d.displayName(),
                  );

                  if (fertilized) {
                    this.eggs.push(new Clutch(clutchSize, this.age));
                  }
                  this.lifetimeEggsMade += clutchSize;

                  this.addLifeEntry(
                    `${dragon.displayName()} lays a clutch of ${clutchSize} eggs!`,
                    fertilized
                      ? sire
                        ? `${sire.displayName()} is the sire. ${listify(family)} hastily ${plural("build", 1 - family.length)} a nest for the ${plural("egg", clutchSize)} and ${plural("consider", 1 - family.length)} what to do next.`
                        : `The sire is unknown. ${listify(family)} nonetheless ${plural("take", 1 - family.length)} the ${plural("egg", clutchSize)} in as their own.`
                      : `The ${plural("egg", clutchSize)} ${clutchSize === 1 ? "is" : "are"} not fertilized. The Solemn Feast is performed without melancholy.`,
                  );
                  dragon.setNextEggAge();
                }
              }
            }

            for (const clutch of this.eggs) {
              if (this.age === clutch.laidOn + clutch.incubationTime) {
                const hatchies = [];
                for (let i = 0; i < clutch.size; i++) {
                  const hatchie = new Dragon().generateBasicDetails();
                  hatchie.name = randomGivenName();
                  hatchies.push(hatchie);
                }
                this.children.push(...hatchies);

                this.addLifeEntry(
                  `the clutch of ${clutch.size} ${plural("egg", clutch.size)} hatch${clutch.size === 1 ? "es" : ""}! The ${plural("hatchling", clutch.size)} ${listify(hatchies.map((d) => d.displayName()))} ${clutch.size === 1 ? "is" : "are"} joyously brought into Lucania.`,
                );

                clutch.size = 0;
              } else {
                if (Math.random() < 0.22) {
                  const nFailed =
                    1 + Math.round(Math.random() * (clutch.size - 1));
                  clutch.size -= nFailed;
                  const broken = Math.random() < 0.2;

                  this.addLifeEntry(
                    `Tragically, ${nFailed} ${plural("egg", nFailed)} from their clutch are found to be ${broken ? "broken, a momentary lack of care bringing despair to the nest" : "cold, the dragon inside never to come to be"}. Woe for what could have been!`,
                  );
                } else if (Math.random() < 0.17) {
                  clutch.size = 0;
                  this.addLifeEntry(
                    `they decide after much deliberation that they are ${pick(["not ready", "unwilling"])} to bring new life into the world. The Solemn Feast next drowsing is solemn indeed.`,
                  );
                }
              }
            }
            this.eggs = this.eggs.filter((c) => c.size > 0);

            // check immortality
            if (this.lifespan !== Infinity && Math.random() < 0.001) {
              this.lifespan = Infinity;
              this.addLifeEntry(
                `${this.pronouns.they} ${this.pronouns.makePlural("decide")} to pursue immortality by ${pickWeighted(MEANS_OF_IMMORTALITY).name}.`,
                `Fly into eternity with open wings, ${this.displayName()}!`,
              );
            }

            // check piety
            let newVirtueChance = 0.0015;
            for (let i = 0; i < this.virtues.length; i++) {
              newVirtueChance /= 2;
            }
            if (this.lifespan === Infinity) {
              newVirtueChance /= 10;
            }

            let vowChance = 0.002;
            for (let i = 0; i < this.virtues.length; i++) {
              vowChance /= 2;
            }
            if (this.lifespan === Infinity) {
              vowChance /= 10;
            }

            if (Math.random() < newVirtueChance) {
              const virtue = pick(
                [...VIRTUES].filter((v) => this.virtues.indexOf(v) === -1),
              );
              if (virtue) {
                this.virtues.push(virtue);
                this.addLifeEntry(
                  `${this.pronouns.they} ${this.pronouns.are()} intrigued by the Virtue of the ${virtue}, and ${this.pronouns.makePlural("decide")} to enter its mystery-cult.`,
                );
              }
            } else if (!this.vow && Math.random() < vowChance) {
              const virtue = pick(this.virtues);
              if (virtue) {
                const vow = pick(VOWS[virtue]);
                if (vow) {
                  this.vow = vow(this);
                  this.addLifeEntry(
                    `${this.pronouns.they} ${this.pronouns.makePlural("decide")} to more deeply show ${this.pronouns.their} faith in the Virtue of the ${virtue}, and ${this.pronouns.makePlural("take")} a vow to ${this.vow}.`,
                  );
                }
              }
            }

            // move locations
            let moveChance = 0.001;
            if (this.age === Infinity) {
              moveChance /= 10;
            }

            if (!this.mentor && Math.random() < moveChance) {
              const newLoc = pick(LOCATIONS);
              if (this.location !== newLoc) {
                this.location = newLoc;
                this.apprentices = [];

                if (this.lair) {
                  this.lair = randomLair();
                  this.addLifeEntry(
                    `${this.pronouns.they} ${this.pronouns.makePlural("decide")} to move to the lair of ${this.lair}, located in ${this.location}.`,
                  );
                } else {
                  this.addLifeEntry(
                    `${this.pronouns.they} ${this.pronouns.makePlural("make")} a journey to ${this.location} and settles there.`,
                  );
                }
              }
            }

            // age up
            this.age++;
            for (const parent of this.parents ?? []) {
              parent.age++;
            }
            for (const mate of this.mates ?? []) {
              mate.age++;
            }
            for (const apprentice of this.apprentices ?? []) {
              apprentice.age++;
            }
          }
        }
      }
    </script>

    <h1>Lucanian Generator</h1>

    <div style="display: flex; justify-content: flex-start">
      <div style="margin: 8px">
        <h2>
          Life of <u id="name">the dragon</u>, the
          <u id="aspect">Aspectless</u> dragon
        </h2>
        <button onclick="updateLife()">Generate A Life</button>
        <ul id="life"></ul>
        <script>
          function updateLife() {
            const dragon = new Dragon().generateLife();
            document.getElementById("name").innerText = dragon.displayName();
            document.getElementById("aspect").innerText =
              dragon.displayAspect();
            const life = document.getElementById("life");
            life.replaceChildren();
            for (const [age, events] of dragon.life.entries()) {
              for (const event of events) {
                const li = document.createElement("li");
                li.innerHTML = `<b>On round ${age},</b> ${event}`;
                life.appendChild(li);
              }
            }
          }
        </script>
      </div>
      <div style="margin: 8px">
        <h2>Name Generator</h2>

        <p>
          Number of names:
          <input id="nNamesBox" type="number" value="10" style="width: 25%" />
        </p>
        <button onclick="updateNames()">Generate Names</button>
        <p>
          <b><ol id="nameBox"></ol></b>
        </p>
        <script>
          function updateNames() {
            const nameBox = document.getElementById("nameBox");
            const nNames = Number(document.getElementById("nNamesBox").value);

            nameBox.replaceChildren();
            for (let i = 0; i < nNames; i++) {
              const li = document.createElement("li");
              li.innerText = randomLucanianName();
              nameBox.appendChild(li);
            }
          }
        </script>
      </div>
      <div style="margin: 8px">
        <h2>Statistics</h2>
        <button onclick="startStopStats()">Start/Stop Stats</button>
        <p id="stats"></p>
        <script>
          let totalEggs = 0;
          let totalHatchies = 0;
          let totalApprentices = 0;
          let totalJobs = 0;
          let totalVirtues = 0;
          let totalVows = 0;

          let statsGoing = false;
          let totalRuns = 0;

          function startStopStats() {
            statsGoing = !statsGoing;
          }

          function updateStats() {
            requestIdleCallback(function () {
              if (statsGoing) {
                for (let i = 0; i < 10; i++) {
                  const dragon = new Dragon().generateLife();
                  totalEggs += dragon.lifetimeEggsMade ?? 0;
                  totalHatchies += (dragon.children ?? []).length;
                  totalApprentices +=
                    (dragon.lifetimeDragonsApprenticed ?? 0) +
                    (this.apprentices ?? []).length;
                  totalJobs +=
                    Object.keys(dragon.highestRankInJobs).length +
                    (dragon.job ? 1 : 0);
                  totalVirtues += (dragon.virtues ?? []).length;
                  totalVows += dragon.vow ? 1 : 0;
                  totalRuns++;
                }

                document.getElementById("stats").innerHTML =
                  `Dragons Simulated: ${totalRuns}<br/>
             Average Eggs Borne: ${(totalEggs / totalRuns).toFixed(2)}<br/>
             Average Hatchlings Begot: ${(totalHatchies / totalRuns).toFixed(2)}<br/>
             Average Apprentices Tutored: ${(totalApprentices / totalRuns).toFixed(2)}<br/>
             Average Careers Held: ${(totalJobs / totalRuns).toFixed(2)}<br/>
             Average Virtues Dedicated To: ${(totalVirtues / totalRuns).toFixed(2)}<br/>
             Average Vows Made: ${(totalVows / totalRuns).toFixed(2)}<br/>`;
              }
              updateStats();
            });
          }

          updateStats();
        </script>
      </div>
    </div>
  </body>
</html>
